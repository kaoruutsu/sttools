<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IP Class Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>IP Class Checker</h1>
    <div id="game-info" style="max-width:750px; margin:0 auto; display:flex; justify-content:space-between; color:var(--accent-blue);">
        <div>Quest: <span id="q-count">0</span> / 5</div>
        <div>Timer: <span id="timer">0.0</span> s</div>
    </div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Class Analysis</h2>
            <p>第1オクテットからクラスを判別せよ</p>
            <button class="start-btn" id="initiate-btn" onclick="start()">INITIATE</button>
        </div>

        <div id="ip-display">0.0.0.0</div>
        <div id="judgment-mark" class="judgment-mark">⭕️</div>
    </div>

    <div id="choices" class="choice-grid" style="max-width:750px;">
        <button class="choice-btn" id="cA" onclick="check('A')">Class A</button>
        <button class="choice-btn" id="cB" onclick="check('B')">Class B</button>
        <button class="choice-btn" id="cC" onclick="check('C')">Class C</button>
    </div>

    <script> /* ...既存のロジック... */ </script>
</body>
</html>
