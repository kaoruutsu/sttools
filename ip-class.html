<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IP Class Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>IP Class Checker</h1>
    <div id="stats-bar">
        <div>Quest: <span id="q-count">0</span> / 5</div>
        <div>Timer: <span id="timer">0.0</span>s</div>
    </div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Class Analysis</h2>
            <p>第1オクテットからクラスを判別せよ</p>
            <button class="btn-base start-btn" onclick="start()">INITIATE</button>
        </div>
        <div id="target" class="bin-display" style="position:absolute; width:100%; top:-100px;">0.0.0.0</div>
        <div id="mark" class="judgment-mark">⭕️</div>
    </div>

    <div class="choice-grid">
        <button class="btn-base choice-btn" onclick="check('A')">Class A<br><small>1-126</small></button>
        <button class="btn-base choice-btn" onclick="check('B')">Class B<br><small>128-191</small></button>
        <button class="btn-base choice-btn" onclick="check('C')">Class C<br><small>192-223</small></button>
    </div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        let correct, qCount=0, score=0, startTime, isWait=false, y=-100, anim;

        function start() { document.getElementById('start-screen').classList.add('hidden'); startTime=Date.now(); next(); }

        function next() {
            if(qCount >= 5) return endGame();
            qCount++; document.getElementById('q-count').innerText = qCount;
            const r = Math.random();
            let first;
            if(r < 0.33) { first = Math.floor(Math.random()*126)+1; correct='A'; }
            else if(r < 0.66) { first = Math.floor(Math.random()*64)+128; correct='B'; }
            else { first = Math.floor(Math.random()*32)+192; correct='C'; }
            
            document.getElementById('target').innerText = `${first}.${Math.floor(Math.random()*255)}.0.1`;
            y = -100; isWait = false; drop();
        }

        function drop() {
            if(isWait) return;
            y += 0.8; document.getElementById('target').style.top = y + 'px';
            if(y > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check(c) { if(!isWait) handle(c === correct); }

        function handle(win) {
            isWait=true; cancelAnimationFrame(anim);
            if(win) score++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className='judgment-mark'; next(); }, 1000);
        }

        function endGame() {
            const time = ((Date.now()-startTime)/1000).toFixed(1);
            alert(`Finish! Score: ${score}/5 in ${time}s`);
            location.reload();
        }
    </script>
</body>
</html>
