<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Master - Hard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Binary Master <span style="font-size: 0.6em; color: #ffeb3b;">(Reverse Hard)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Reverse Attack</h2>
            <div class="speed-select">
                <div class="speed-btns">
                    <button class="speed-btn" onclick="setSpeed(0.4, this)">Slow</button>
                    <button class="speed-btn active" onclick="setSpeed(0.65, this)">Normal</button>
                    <button class="speed-btn" onclick="setSpeed(1.2, this)">Fast</button>
                </div>
            </div>
            <button class="start-btn" onclick="start()">START</button>
        </div>

        <div id="result-screen" class="overlay" style="display:none;">
            <h2>FINISH!</h2>
            <div style="font-size: 24px; color: #fff;">Score: <span id="final-score">0</span> / 5</div>
            <div id="final-time" style="font-size: 48px; color: var(--accent-cyan);">0.00</div>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="target" class="bin-display" style="position:absolute; width:100%; top:-50px;">00000000</div>
        <div id="mark" class="judgment-mark">⭕️</div>
    </div>

    <div class="choice-grid">
        <button class="choice-btn" onclick="check(0)">?</button>
        <button class="choice-btn" onclick="check(0)">?</button>
        <button class="choice-btn" onclick="check(0)">?</button>
        <button class="choice-btn" onclick="check(0)">?</button>
        <button class="choice-btn" onclick="check(0)">?</button>
    </div>
    
    <script> /* ...既存のロジック... */ </script>
</body>
</html>
