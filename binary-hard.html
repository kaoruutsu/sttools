<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Master - Hard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .bin-display {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: nowrap;
        }
        /* 5択ボタンのレイアウト */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: 20px auto;
        }
        .choice-btn {
            height: 80px;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 123, 255, 0.1);
            border: 2px solid #007bff;
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .choice-btn:hover { background: rgba(0, 255, 204, 0.2); border-color: #00ffcc; }
        .choice-btn::before {
            content: attr(data-key);
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 12px;
            color: #4dd0e1;
        }
        @media (max-width: 600px) {
            .choice-grid { grid-template-columns: repeat(3, 1fr); }
            .choice-btn { height: 60px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <h1>Binary Master <span style="font-size: 0.6em; color: #ff5252;">(Hard - Convert)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Select Mode</h2>
            <p>落ちてくる2進数を10進数で答えろ！</p>
            <div class="start-btns">
                <button class="start-btn" onclick="start('4')">4-bit</button>
                <button class="start-btn" onclick="start('8')">8-bit</button>
                <button class="start-btn btn-hint" onclick="start('mix')">MIX</button>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display:none;">
            <h2>MISSION COMPLETE</h2>
            <div style="font-size: 24px; color: #fff; margin-bottom: 10px;">Score: <span id="final-score">0</span> / 5</div>
            <div class="result-time"><span id="final-time">0.00</span> sec</div>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="mark" class="judgment-mark"></div>
        <div id="target" class="bin-display"></div>
    </div>

    <div class="choice-grid" id="choices"></div>

    <a href="index.html" class="back-link">MENUへ戻る</a>

    <script>
        let targetVal, qNum = 0, correctCount = 0, startTime, isWait = false, y = -100, anim;
        let gameMode = '4'; // '4', '8', 'mix'
        const MAX_QUEST = 5;

        function start(mode) {
            gameMode = mode;
            document.getElementById('start-screen').style.display = 'none';
            startTime = Date.now();
            next();
        }

        function next() {
            qNum++;
            if (qNum > MAX_QUEST) { endGame(); return; }
            document.getElementById('q-count').innerText = qNum;

            // モードに応じてビット数を決定
            let currentBitLength = 4;
            if (gameMode === '8') currentBitLength = 8;
            if (gameMode === 'mix') currentBitLength = Math.random() > 0.5 ? 8 : 4;

            targetVal = Math.floor(Math.random() * (currentBitLength === 4 ? 15 : 255)) + 1;
            const binStr = targetVal.toString(2).padStart(currentBitLength, '0');

            // 表示の作成
            const targetEl = document.getElementById('target');
            if (currentBitLength === 8) {
                targetEl.innerHTML = `<span>${binStr.substring(0, 4)}</span><span class="bin-gap"></span><span>${binStr.substring(4, 8)}</span>`;
            } else {
                targetEl.innerText = binStr;
            }

            createChoices(targetVal, currentBitLength);
            y = -100; isWait = false; 
            targetEl.style.display = 'block';
            drop();
        }

        function createChoices(correct, bitLen) {
            const container = document.getElementById('choices');
            container.innerHTML = '';
            
            let options = new Set();
            options.add(correct);

            // 間違えそうな選択肢を生成
            while (options.size < 5) {
                let choice;
                const r = Math.random();
                if (r < 0.4) {
                    // 1ビットだけ違う（惜しいミス）
                    choice = correct ^ (1 << Math.floor(Math.random() * bitLen));
                } else if (r < 0.7) {
                    // 近い数値
                    choice = correct + (Math.floor(Math.random() * 7) - 3);
                } else {
                    // 全然違う数値
                    choice = Math.floor(Math.random() * (bitLen === 4 ? 15 : 255)) + 1;
                }
                if (choice >= 0 && choice <= (bitLen === 4 ? 15 : 255)) options.add(choice);
            }

            // シャッフルして配置
            [...options].sort(() => Math.random() - 0.5).forEach((val, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = val;
                btn.setAttribute('data-key', i + 1);
                btn.onclick = () => check(val);
                container.appendChild(btn);
            });
        }

        function drop() {
            if (isWait) return;
            y += 0.65;
            document.getElementById('target').style.top = y + 'px';
            if (y > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check(val) {
            if (isWait) return;
            if (val === targetVal) handle(true); else handle(false);
        }

        function handle(win) {
            isWait = true; cancelAnimationFrame(anim);
            if (win) correctCount++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className = 'judgment-mark'; next(); }, 800);
        }

        function endGame() {
            const duration = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById('final-time').innerText = duration;
            document.getElementById('final-score').innerText = correctCount;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('target').style.display = 'none';
        }

        // キーボード入力 (1-5キー)
        window.addEventListener('keydown', (e) => {
            if (isWait) return;
            const idx = parseInt(e.key) - 1;
            const buttons = document.querySelectorAll('.choice-btn');
            if (buttons[idx]) buttons[idx].click();
        });
    </script>
</body>
</html>
