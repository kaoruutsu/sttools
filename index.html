<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary & Hex Training Portal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .list-container { 
            display: flex;
            flex-direction: column; /* 一列に並べる */
            gap: 15px; 
            max-width: 600px; 
            margin: 20px auto; 
            padding: 0 15px;
        }
        .card { 
            background: rgba(0, 92, 153, 0.2); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #005c99; 
            text-decoration: none; 
            color: #fff; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .card:hover { 
            border-color: #00ffcc; 
            transform: translateX(10px); /* 横に少しスライドする演出 */
            background: rgba(0, 92, 153, 0.4); 
        }
        .card h3 { margin: 0 0 8px 0; color: #00ffcc; font-size: 1.3rem; }
        .card p { margin: 0; font-size: 0.95rem; color: #b2ebf2; line-height: 1.4; }
        
        /* セクション分けのラベル */
        .section-label {
            text-align: left;
            margin: 20px 0 5px 5px;
            font-weight: bold;
            color: #4dd0e1;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>Training Portal</h1>
    
    <div class="list-container">
        
        <div class="section-label">Binary Training</div>
        
        <a href="binary-easy.html" class="card">
            <h3>Binary Master (Easy)</h3>
            <p>4ビット計算：2進数の基本をマスター（5問タイムアタック）</p>
        </a>

        <a href="binary-master.html" class="card">
            <h3>Binary Master (Normal)</h3>
            <p>8ビット計算：実践的な8桁の2進数変換トレーニング</p>
        </a>

        <div class="section-label">Hexadecimal Training</div>

        <a href="hex-easy.html" class="card" style="border-color: #ffeb3b44;">
            <h3>Hex Master (Easy)</h3>
            <p>4ビット 2進数 → 16進数：1桁の16進数（0-F）への変換</p>
        </a>

        <a href="hex-master.html" class="card" style="border-color: #ffeb3b44;">
            <h3>Hex Master (Normal)</h3>
            <p>8ビット 2進数 → 16進数：2桁の16進数への素早い変換</p>
        </a>

    </div>
</body>
</html>
