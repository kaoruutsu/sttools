<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Portal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 0 15px;
        }
        .card { 
            background: rgba(0, 92, 153, 0.2); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #005c99; 
            text-decoration: none; 
            color: #fff; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }
        .card:hover { border-color: #00bcd4; transform: scale(1.02); background: rgba(0, 92, 153, 0.4); }
        .card h3 { margin: 0 0 10px 0; color: #00ffcc; font-size: 1.2rem; }
        .card p { margin: 0; font-size: 0.9rem; color: #b2ebf2; line-height: 1.4; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; margin: 20px 0; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .card { padding: 15px; }
            .card h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <h1>Training Portal</h1>
    <div class="grid">
        <a href="binary-easy.html" class="card" style="border-color: #00bcd4; background: rgba(0, 188, 212, 0.1);">
            <h3>Binary Master (Easy)</h3>
            <p>4ビット計算：まずはここからスタート（5問タイムアタック）</p>
        </a>
        <a href="binary-master.html" class="card">
            <h3>Binary Master (Normal)</h3>
            <p>8ビット計算：エンジニアの標準レベル</p>
        </a>
        </div>
</body>
</html>
