<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL BASIC - Normal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>SQL Training <span style="font-size: 0.6em; color: var(--accent-yellow);">(Normal)</span></h1>

    <div class="source-section" id="tables-area"></div>

    <div class="mission-box">
        <div style="color:var(--accent-yellow); font-weight:bold;">MISSION:</div>
        <div id="mission-text">読み込み中...</div>
    </div>

    <div class="sql-display">
        <div id="drop-zone" class="drop-zone"></div>
    </div>

    <div id="chip-pool" style="display:flex; flex-wrap:wrap; gap:10px; margin:20px 0; justify-content:center;"></div>

    <div style="margin-top:20px;">
        <button class="start-btn" id="run-btn" onclick="checkAnswer()">RUN SQL</button>
        <button class="start-btn" style="background:#444; color:#fff;" onclick="clearLastChip()">UNDO</button>
    </div>

    <div id="mark" class="judgment-mark">⭕️</div>

    <script> /* ...既存のロジック... */ </script>
</body>
</html>
