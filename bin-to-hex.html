<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Binary to Hex</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #bin-display {
            position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
            color: #00ffcc; font-size: 52px; font-weight: bold;
            background: rgba(0, 30, 60, 0.95); padding: 15px 40px; border-radius: 12px;
            border: 2px solid #00ffcc; font-family: monospace; letter-spacing: 4px;
        }
        #choices { display: flex; justify-content: center; gap: 10px; width: 750px; margin: 30px auto; }
        .hex-prefix { font-size: 16px; color: #4dd0e1; margin-right: 1px; }
        .hex-value { font-size: 32px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Binary to Hex</h1>
    <div id="game-info" style="width:750px; margin:0 auto; display:flex; justify-content:space-between;">
        <div>Quest: <span id="q-count">0</span> / 5</div>
        <div>Timer: <span id="timer">0.0</span> s</div>
    </div>
    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Hex Conversion</h2>
            <p>下4ビットだけ見れば良いとは限らない...</p>
            <button class="start-btn" onclick="startGame()">INITIATE</button>
        </div>
        <div id="result-screen" class="overlay hidden">
            <h2>Complete</h2>
            <p>Score: <span id="final-score"></span> / 5</p>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>
        <div id="judgment-mark" class="judgment-mark"></div>
        <div id="bin-display" class="hidden"></div>
        <a href="index.html" class="back-btn-ui">RETURN TO MENU</a>
    </div>
    <div id="choices">
        <button class="choice-btn" id="c0" onclick="check(0)"></button>
        <button class="choice-btn" id="c1" onclick="check(1)"></button>
        <button class="choice-btn" id="c2" onclick="check(2)"></button>
        <button class="choice-btn" id="c3" onclick="check(3)"></button>
        <button class="choice-btn" id="c4" onclick="check(4)"></button>
    </div>

    <script>
        let correctVal, score=0, currentQ=0, startTime, gameTimer, anim, ipY=-80, isWait=false;
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('bin-display').classList.remove('hidden');
            startTime = Date.now();
            gameTimer = setInterval(() => { document.getElementById('timer').innerText = ((Date.now()-startTime)/1000).toFixed(1); }, 100);
            next();
        }
        function next() {
            if(currentQ >= 5) { endGame(); return; }
            currentQ++;
            document.getElementById('q-count').innerText = currentQ;
            correctVal = Math.floor(Math.random()*256);
            document.getElementById('bin-display').innerText = correctVal.toString(2).padStart(8,'0');
            
            let c = [correctVal];
            let upper = correctVal & 0xF0, lower = correctVal & 0x0F;
            let t1 = upper | ((lower + 5) % 16); if(!c.includes(t1)) c.push(t1);
            let t2 = ((upper >> 4 + 3) % 16 << 4) | lower; if(!c.includes(t2)) c.push(t2);
            while(c.length<5) { let d = Math.floor(Math.random()*256); if(!c.includes(d)) c.push(d); }
            c.sort((a,b)=>a-b);
            
            c.forEach((v,i) => {
                const btn = document.getElementById(`c${i}`);
                btn.innerHTML = `<span class="hex-prefix">0x</span><span class="hex-value">${v.toString(16).toUpperCase().padStart(2,'0')}</span>`;
                btn.dataset.val = v; btn.disabled=false; btn.className='choice-btn';
            });
            ipY=-80; isWait=false; drop();
        }
        function drop() {
            if(isWait) return;
            ipY += 0.8;
            document.getElementById('bin-display').style.top = ipY + 'px';
            if(ipY > 320) handle(false); else anim = requestAnimationFrame(drop);
        }
        function check(i) {
            const val = parseInt(document.getElementById(`c${i}`).dataset.val);
            handle(val === correctVal, i);
        }
        function handle(win, idx) {
            isWait=true; cancelAnimationFrame(anim);
            if(win) score++;
            const m = document.getElementById('judgment-mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = 'judgment-mark show-mark ' + (win ? 'mark-o' : 'mark-x');
            for(let i=0; i<5; i++) {
                const b = document.getElementById(`c${i}`);
                if(parseInt(b.dataset.val) === correctVal) b.classList.add('correct-btn');
                else if(i===idx) b.classList.add('wrong-btn');
                b.disabled = true;
            }
            setTimeout(() => { m.className='judgment-mark'; next(); }, 1000);
        }
        function endGame() {
            clearInterval(gameTimer);
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
