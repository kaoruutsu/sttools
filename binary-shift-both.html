<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Binary Shift - Fixed Point</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dot { font-size: 40px; color: var(--accent-cyan); align-self: center; margin: 0 -5px; }
    </style>
</head>
<body>
    <h1>Binary Shift <span>(Fixed Point)</span></h1>

    <div id="stats-bar" style="justify-content:center;">
        <div style="font-size: 1.5rem;">Decimal: <span id="dec-val" style="color:var(--accent-cyan)">0</span></div>
    </div>

    <div id="bit-container" class="controls-row" style="margin: 40px 0;"></div>

    <div class="controls-row" style="max-width: 600px; margin: 0 auto;">
        <button class="btn-base choice-btn" style="flex:1" onclick="shiftLeft()">Left Shift (×2)</button>
        <button class="btn-base choice-btn" style="flex:1" onclick="shiftRight()">Right Shift (÷2)</button>
    </div>
    
    <div class="controls-row" style="max-width: 600px; margin: 10px auto;">
        <button class="btn-base control-btn btn-warning" style="flex:1" onclick="randomBits()">Random</button>
        <button class="btn-base control-btn" style="flex:1" onclick="init()">Clear</button>
    </div>

    <div id="overflow-msg" style="color:var(--error-red); height:24px; margin-top:15px; font-weight:bold;"></div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        let bits = Array(8).fill(0);

        function init() { bits.fill(0); render(); }

        function render() {
            const container = document.getElementById('bit-container');
            container.innerHTML = '';
            // 上位4ビット(整数)
            for(let i=7; i>=4; i--) container.appendChild(createBit(i));
            
            // 小数点
            const dot = document.createElement('div');
            dot.className = 'dot'; dot.innerText = '.';
            container.appendChild(dot);

            // 下位4ビット(小数)
            for(let i=3; i>=0; i--) container.appendChild(createBit(i));

            // 計算
            let val = 0;
            for(let i=0; i<8; i++) if(bits[i]) val += Math.pow(2, i-4);
            document.getElementById('dec-val').innerText = val.toFixed(4).replace(/\.?0+$/, "");
        }

        function createBit(i) {
            const div = document.createElement('div');
            div.className = 'bit-box' + (bits[i] ? ' on' : '');
            div.innerText = bits[i];
            div.onclick = () => { bits[i] = bits[i] ? 0 : 1; render(); };
            return div;
        }

        function shiftLeft() {
            const over = bits[7];
            for(let i=7; i>0; i--) bits[i] = bits[i-1];
            bits[0] = 0;
            if(over) showMsg('⚠️ Integer Overflow'); render();
        }

        function shiftRight() {
            const over = bits[0];
            for(let i=0; i<7; i++) bits[i] = bits[i+1];
            bits[7] = 0;
            if(over) showMsg('⚠️ Precision Loss'); render();
        }

        function randomBits() { bits = bits.map(() => Math.random() > 0.5 ? 1 : 0); bits[7]=0; render(); }

        function showMsg(m) {
            const el = document.getElementById('overflow-msg');
            el.innerText = m; setTimeout(() => el.innerText = '', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
