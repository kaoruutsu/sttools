<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Shift - Fixed Point</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Binary Shift <span style="font-size: 0.6em; color: var(--accent-blue);">(Fixed Point)</span></h1>

    <div class="info-panel">
        <div class="info-item">Decimal: <span id="dec-val" style="color:var(--accent-cyan)">0</span></div>
    </div>

    <div id="bit-container" style="display:flex; justify-content:center; gap:8px; margin:30px 0;"></div>
    <div id="overflow-msg" style="color:var(--error-red); height:24px; font-weight:bold;"></div>

    <div class="shift-controls">
        <button class="shift-btn" onclick="shiftLeft()">Left Shift (×2)</button>
        <button class="shift-btn" onclick="shiftRight()">Right Shift (÷2)</button>
        <button class="shift-btn" style="border-color:var(--accent-yellow)" onclick="randomBits()">Random</button>
        <button class="shift-btn" style="border-color:#666" onclick="clearBits()">Clear</button>
    </div>

    <script> /* ...既存のロジック... */ </script>
</body>
</html>
