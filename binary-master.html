<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Master - Normal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Binary Master <span style="font-size: 0.6em; color: #4dd0e1;">(8-bit Normal)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>8-bit Attack</h2>
            <p>ヒント（128, 64...）を表示しますか？</p>
            <div class="start-btns">
                <button class="start-btn btn-hint" onclick="start(true)">HINT ON</button>
                <button class="start-btn" onclick="start(false)">HINT OFF</button>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display:none;">
            <h2>MISSION COMPLETE</h2>
            <div style="font-size: 24px; color: #fff; margin-bottom: 10px;">Score: <span id="final-score">0</span> / 5</div>
            <div class="result-time"><span id="final-time">0.00</span> sec</div>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="mark" class="judgment-mark"></div>
        <div id="target">0</div>
    </div>

    <div id="sum-text" style="font-size: 28px; margin: 15px; font-weight: bold;">Current: 0</div>
    <div class="bit-row" id="bits-ui"></div>

    <a href="index.html" class="back-link">MENUへ戻る</a>

    <script>
        let targetVal, currentBits = Array(8).fill(0), y = -100, isWait = false, anim;
        let qNum = 0, correctCount = 0, startTime, useHint = false;
        const MAX_QUEST = 5;

        function start(hint) { 
            useHint = hint;
            document.getElementById('start-screen').style.display='none'; 
            startTime = Date.now();
            next(); 
        }

        function next() {
            qNum++;
            if (qNum > MAX_QUEST) { endGame(); return; }
            document.getElementById('q-count').innerText = qNum;
            
            targetVal = Math.floor(Math.random() * 254) + 1;
            let targetBits = targetVal.toString(2).padStart(8, '0').split('').reverse().map(Number);
            
            currentBits = [...targetBits];
            let diff = Math.floor(Math.random() * 3) + 1;
            let changed = [];
            while(changed.length < diff) {
                let r = Math.floor(Math.random() * 8);
                if(!changed.includes(r)) { currentBits[r] = currentBits[r]?0:1; changed.push(r); }
            }

            document.getElementById('target').innerText = targetVal;
            document.getElementById('target').style.display = 'block';
            render(); y = -100; isWait = false; drop();
        }

        function render() {
            const container = document.getElementById('bits-ui');
            container.innerHTML = '';
            currentBits.slice().reverse().forEach((bit, i) => {
                const realIdx = 7 - i;
                const column = document.createElement('div');
                column.className = 'bit-column';

                const hintDiv = document.createElement('div');
                hintDiv.className = 'hint-text';
                hintDiv.innerText = useHint ? Math.pow(2, realIdx) : '';
                column.appendChild(hintDiv);

                const btn = document.createElement('button');
                btn.className = `bit-btn ${bit ? 'on' : ''}`;
                btn.innerText = bit;
                btn.onclick = () => { if(!isWait) { toggleBit(realIdx); }};
                column.appendChild(btn);
                container.appendChild(column);
            });
            document.getElementById('sum-text').innerText = `Current: ${calculateSum()}`;
        }

        function toggleBit(idx) {
            currentBits[idx] = currentBits[idx] ? 0 : 1;
            render();
            check();
        }

        function calculateSum() { return currentBits.reduce((s, b, i) => s + b * Math.pow(2, i), 0); }

        function drop() {
            if(isWait) return;
            y += 0.75;
            document.getElementById('target').style.top = y + 'px';
            if(y > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check() { if(calculateSum() === targetVal) handle(true); }

        function handle(win) {
            isWait = true; cancelAnimationFrame(anim);
            if(win) correctCount++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌'; 
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className = 'judgment-mark'; next(); }, 800);
        }

        function endGame() {
            const duration = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById('final-time').innerText = duration;
            document.getElementById('final-score').innerText = correctCount;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('target').style.display = 'none';
        }

        // キーボード入力 (1-8 キーで各ビットを操作)
        window.addEventListener('keydown', (e) => {
            if (isWait) return;
            const keyMap = { '8':7, '7':6, '6':5, '5':4, '4':3, '3':2, '2':1, '1':0 };
            if (keyMap[e.key] !== undefined) toggleBit(keyMap[e.key]);
        });
    </script>
</body>
</html>
