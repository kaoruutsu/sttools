<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Shift - Left</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .shift-controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .shift-btn { padding: 12px 18px; font-size: 16px; background: rgba(0, 123, 255, 0.2); border: 2px solid #007bff; color: #fff; border-radius: 8px; cursor: pointer; transition: 0.2s; flex: 1; min-width: 100px; max-width: 140px; text-align: center; }
        .shift-btn:hover { background: rgba(0, 255, 204, 0.2); border-color: #00ffcc; }
        
        .info-panel { display: flex; justify-content: center; margin: 10px 0; font-size: 20px; }
        .info-item { background: rgba(0, 50, 80, 0.5); padding: 10px 30px; border-radius: 8px; border: 1px solid #005c99; }
        .info-item span { color: #00ffcc; font-weight: bold; }
        
        .overflow-indicator { color: #ff5252; font-size: 14px; height: 40px; margin: 5px 15px; text-align: center; }
        
        .bit-display { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin: 15px auto; max-width: 100%; }
        .bit-cell { width: 42px; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        .bit-cell .weight { font-size: 11px; color: #4dd0e1; margin-bottom: 5px; }
        .bit-cell .value { width: 100%; height: 48px; line-height: 48px; font-size: 22px; font-weight: bold; background: rgba(0, 80, 120, 0.3); border: 2px solid #005c99; border-radius: 8px; color: #fff; cursor: pointer; transition: 0.2s; text-align: center; user-select: none; }
        .bit-cell .value.one { background: rgba(0, 255, 204, 0.3); border-color: #00ffcc; color: #00ffcc; }
        
        /* 4ビット区切りのためのスペーサー */
        .bit-spacer { width: 15px; }

        .mode-select { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        .mode-select button { padding: 10px 20px; background: rgba(0, 123, 255, 0.1); border: 1px solid #007bff; color: #fff; border-radius: 5px; cursor: pointer; }
        .mode-select button.active { background: rgba(0, 255, 204, 0.2); border-color: #00ffcc; }

        @media (max-width: 400px) { 
            .bit-cell { width: 38px; } 
            .bit-cell .value { height: 44px; line-height: 44px; font-size: 20px; } 
            .shift-btn { font-size: 14px; padding: 10px; }
            .bit-spacer { width: 10px; }
        }
    </style>
</head>
<body>
    <h1>Binary Shift <span style="font-size: 0.6em; color: #00ffcc;">(Left Shift)</span></h1>
    
    <div class="mode-select">
        <button id="mode-4" class="active" onclick="setMode(4)">4-bit</button>
        <button id="mode-8" onclick="setMode(8)">8-bit</button>
    </div>

    <div class="info-panel">
        <div class="info-item">DEC: <span id="dec-display">0</span></div>
    </div>

    <div class="overflow-indicator" id="overflow-msg"></div>

    <div class="bit-display" id="bit-display"></div>

    <div class="shift-controls">
        <button class="shift-btn" onclick="shiftLeft()">← 左シフト</button>
        <button class="shift-btn" onclick="shiftRight()">右シフト →</button>
        <button class="shift-btn" onclick="clearBits()" style="background: rgba(100,100,100,0.2); border-color: #666;">CLEAR</button>
        <button class="shift-btn" onclick="randomBits()" style="background: rgba(128, 0, 128, 0.2); border-color: #800080;">RANDOM</button>
    </div>

    <a href="index.html" class="back-link">MENUへ戻る</a>

    <script>
        let bitLength = 4;
        let bits = [];
        
        function init() {
            // 全ビットを0で初期化
            bits = Array(bitLength).fill(0);
            render();
        }
        
        function setMode(len) {
            bitLength = len;
            document.getElementById('mode-4').className = len === 4 ? 'active' : '';
            document.getElementById('mode-8').className = len === 8 ? 'active' : '';
            init();
        }
        
        function render() {
            const container = document.getElementById('bit-display');
            container.innerHTML = '';
            
            for (let i = bitLength - 1; i >= 0; i--) {
                // 8ビットモード時、4ビットと3ビットの間にスペーサーを挿入
                if (bitLength === 8 && i === 3) {
                    const spacer = document.createElement('div');
                    spacer.className = 'bit-spacer';
                    container.appendChild(spacer);
                }

                const cell = document.createElement('div');
                cell.className = 'bit-cell';
                
                const weight = document.createElement('div');
                weight.className = 'weight';
                weight.innerText = Math.pow(2, i);
                
                const value = document.createElement('div');
                value.className = 'value' + (bits[i] ? ' one' : '');
                value.innerText = bits[i];
                // タップで反転
                value.onclick = () => toggleBit(i);
                
                cell.appendChild(weight);
                cell.appendChild(value);
                container.appendChild(cell);
            }
            
            let dec = 0;
            for (let i = 0; i < bitLength; i++) {
                if (bits[i]) dec += Math.pow(2, i);
            }
            document.getElementById('dec-display').innerText = dec;
            document.getElementById('overflow-msg').innerText = '';
        }
        
        function toggleBit(idx) {
            bits[idx] = bits[idx] ? 0 : 1;
            render();
        }
        
        function shiftLeft() {
            const overflowBit = bits[bitLength - 1];
            for (let i = bitLength - 1; i > 0; i--) {
                bits[i] = bits[i - 1];
            }
            bits[0] = 0;
            const overflowMsg = document.getElementById('overflow-msg');
            if (overflowBit) {
                overflowMsg.innerText = '⚠️ 桁あふれ: 最上位ビットが切り捨てられました';
            }
            render();
        }
        
        function shiftRight() {
            const overflowBit = bits[0];
            for (let i = 0; i < bitLength - 1; i++) {
                bits[i] = bits[i + 1];
            }
            bits[bitLength - 1] = 0;
            const overflowMsg = document.getElementById('overflow-msg');
            if (overflowBit) {
                overflowMsg.innerText = '⚠️ 桁あふれ: 最下位ビットが切り捨てられました';
            }
            render();
        }
        
        function clearBits() {
            // 全ビットを0にして初期化
            init();
        }

        function randomBits() {
            // 最上位ビットを必ず0にするランダム生成
            bits = Array.from({length: bitLength}, (_, i) => 
                (i === bitLength - 1) ? 0 : Math.floor(Math.random() * 2)
            );
            render();
        }
        
        init();
    </script>
</body>
</html>
