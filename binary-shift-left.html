<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Shift - Basic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Binary Shift <span>(Basic)</span></h1>

    <div id="stats-bar" style="justify-content:center;">
        <div style="font-size: 1.5rem;">Decimal: <span id="dec-val" style="color:var(--accent-cyan)">0</span></div>
    </div>

    <div id="bit-container" class="controls-row" style="margin: 40px 0;"></div>

    <div class="controls-row" style="max-width: 600px; margin: 0 auto;">
        <button class="btn-base choice-btn" style="flex:1" onclick="shiftLeft()">Left Shift (×2)</button>
        <button class="btn-base choice-btn" style="flex:1" onclick="shiftRight()">Right Shift (÷2)</button>
    </div>
    
    <div class="controls-row" style="max-width: 600px; margin: 10px auto;">
        <button class="btn-base control-btn btn-warning" style="flex:1" onclick="randomBits()">Random</button>
        <button class="btn-base control-btn" style="flex:1" onclick="init()">Clear</button>
    </div>

    <div id="overflow-msg" style="color:var(--error-red); height:24px; margin-top:15px; font-weight:bold;"></div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        const bitLength = 8;
        let bits = Array(bitLength).fill(0);

        function init() {
            bits = Array(bitLength).fill(0);
            render();
        }

        function render() {
            const container = document.getElementById('bit-container');
            container.innerHTML = '';
            bits.slice().reverse().forEach((b, i) => {
                const idx = bitLength - 1 - i;
                const div = document.createElement('div');
                div.className = 'bit-box' + (b ? ' on' : '');
                div.innerText = b;
                div.onclick = () => toggle(idx);
                container.appendChild(div);
            });
            document.getElementById('dec-val').innerText = parseInt(bits.slice().reverse().join(''), 2);
        }

        function toggle(i) { bits[i] = bits[i] ? 0 : 1; render(); }

        function shiftLeft() {
            const over = bits[bitLength-1];
            for(let i=bitLength-1; i>0; i--) bits[i] = bits[i-1];
            bits[0] = 0;
            if(over) showMsg('⚠️ 桁あふれ（切り捨て）');
            render();
        }

        function shiftRight() {
            const over = bits[0];
            for(let i=0; i<bitLength-1; i++) bits[i] = bits[i+1];
            bits[bitLength-1] = 0;
            if(over) showMsg('⚠️ 桁あふれ（切り捨て）');
            render();
        }

        function randomBits() {
            bits = bits.map(() => Math.random() > 0.5 ? 1 : 0);
            bits[bitLength-1] = 0; // 溢れ防止
            render();
        }

        function showMsg(m) {
            const el = document.getElementById('overflow-msg');
            el.innerText = m;
            setTimeout(() => el.innerText = '', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
