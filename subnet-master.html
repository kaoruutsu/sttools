<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Subnet Master</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #mask-display {
            position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
            color: #00ffcc; font-size: 64px; font-weight: bold;
            background: rgba(0, 30, 60, 0.95); padding: 15px 50px; border-radius: 12px;
            border: 2px solid #00ffcc; font-family: monospace;
        }
        #choices { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 750px; margin: 30px auto; }
        .choice-btn { padding: 15px 0; font-size: 22px; }
    </style>
</head>
<body>
    <h1>Subnet Master</h1>
    <div id="game-info" style="width:750px; margin:0 auto; display:flex; justify-content:space-between;">
        <div>Quest: <span id="q-count">0</span> / 5</div>
        <div>Timer: <span id="timer">0.0</span> s</div>
    </div>
    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Subnet Analysis</h2>
            <p>サブネットマスクに対応するCIDR(/XX)を選べ。</p>
            <button class="start-btn" onclick="startGame()">INITIATE</button>
        </div>
        <div id="result-screen" class="overlay hidden">
            <h2>Complete</h2>
            <p>Score: <span id="final-score"></span> / 5</p>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>
        <div id="judgment-mark" class="judgment-mark"></div>
        <div id="mask-display" class="hidden"></div>
        <a href="index.html" class="back-btn-ui">RETURN TO MENU</a>
    </div>
    <div id="choices">
        </div>

    <script>
        let correctCIDR, score=0, currentQ=0, startTime, gameTimer, anim, ipY=-80, isWait=false;
        const masks = {
            8: "255.0.0.0", 16: "255.255.0.0", 24: "255.255.255.0",
            25: "255.255.255.128", 26: "255.255.255.192", 27: "255.255.255.224",
            28: "255.255.255.240", 29: "255.255.255.248", 30: "255.255.255.252"
        };

        function startGame() {
            const container = document.getElementById('choices');
            Object.keys(masks).forEach(cidr => {
                const b = document.createElement('button');
                b.className = 'choice-btn'; b.id = 'c'+cidr;
                b.innerText = '/' + cidr;
                b.onclick = () => check(cidr);
                container.appendChild(b);
            });
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('mask-display').classList.remove('hidden');
            startTime = Date.now();
            gameTimer = setInterval(() => { document.getElementById('timer').innerText = ((Date.now()-startTime)/1000).toFixed(1); }, 100);
            next();
        }

        function next() {
            if(currentQ >= 5) { endGame(); return; }
            currentQ++;
            document.getElementById('q-count').innerText = currentQ;
            const keys = Object.keys(masks);
            correctCIDR = keys[Math.floor(Math.random()*keys.length)];
            document.getElementById('mask-display').innerText = masks[correctCIDR];
            document.querySelectorAll('.choice-btn').forEach(b=>{ b.disabled=false; b.className='choice-btn'; });
            ipY=-80; isWait=false; drop();
        }

        function drop() {
            if(isWait) return;
            ipY += 0.8;
            document.getElementById('mask-display').style.top = ipY + 'px';
            if(ipY > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check(c) { handle(c === correctCIDR, c); }

        function handle(win, sel) {
            isWait=true; cancelAnimationFrame(anim);
            if(win) score++;
            const m = document.getElementById('judgment-mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = 'judgment-mark show-mark ' + (win ? 'mark-o' : 'mark-x');
            document.querySelectorAll('.choice-btn').forEach(b => {
                const c = b.id.replace('c','');
                if(c === correctCIDR) b.classList.add('correct-btn');
                else if(c === sel) b.classList.add('wrong-btn');
                b.disabled = true;
            });
            setTimeout(() => { m.className='judgment-mark'; next(); }, 1000);
        }

        function endGame() {
            clearInterval(gameTimer);
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
