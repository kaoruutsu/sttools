<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Subnet Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Subnet Master</h1>
    <div id="stats-bar">
        <div>Quest: <span id="q-count">0</span> / 5</div>
    </div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>CIDR Analysis</h2>
            <p>サブネットマスクに対応する表記を選べ</p>
            <button class="btn-base start-btn" onclick="start()">INITIATE</button>
        </div>
        <div id="target" class="bin-display" style="position:absolute; width:100%; top:-100px; font-size:36px;">255.255.255.0</div>
        <div id="mark" class="judgment-mark">⭕️</div>
    </div>

    <div class="choice-grid" id="choices"></div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        const masks = [
            {m:"255.0.0.0", c:8}, {m:"255.128.0.0", c:9}, {m:"255.255.0.0", c:16},
            {m:"255.255.128.0", c:17}, {m:"255.255.240.0", c:20}, {m:"255.255.255.0", c:24},
            {m:"255.255.255.128", c:25}, {m:"255.255.255.192", c:26}, {m:"255.255.255.240", c:28}, {m:"255.255.255.252", c:30}
        ];
        let correct, qCount=0, isWait=false, y=-100, anim;

        function start() { document.getElementById('start-screen').classList.add('hidden'); next(); }

        function next() {
            if(qCount >= 5) { alert("Done!"); return location.reload(); }
            qCount++; document.getElementById('q-count').innerText = qCount;
            const item = masks[Math.floor(Math.random()*masks.length)];
            correct = item.c;
            document.getElementById('target').innerText = item.m;

            const opts = [correct];
            while(opts.length < 4) {
                let r = Math.floor(Math.random()*23)+8;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort((a,b)=>a-b);
            
            const grid = document.getElementById('choices');
            grid.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-base choice-btn';
                b.innerText = '/' + o;
                b.onclick = () => check(o);
                grid.appendChild(b);
            });

            y = -100; isWait = false; drop();
        }

        function drop() {
            if(isWait) return;
            y += 0.8; document.getElementById('target').style.top = y + 'px';
            if(y > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check(v) { if(!isWait) handle(v === correct); }

        function handle(win) {
            isWait=true; cancelAnimationFrame(anim);
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className='judgment-mark'; next(); }, 1000);
        }
    </script>
</body>
</html>
