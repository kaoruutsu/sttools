<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hex Master - Normal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hex-input-box { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .hex-digit { width: 60px; height: 80px; border: 2px solid var(--accent-blue); background: #002244; font-size: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .hex-digit.active { border-color: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); }
    </style>
</head>
<body>
    <h1>Hex Master <span>(8-bit Normal)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Hex Attack</h2>
            <p>2進数を2桁の16進数で答えろ</p>
            <div class="controls-row">
                <button class="control-btn" onclick="setSpeed(0.4, this)">Slow</button>
                <button class="control-btn active" onclick="setSpeed(0.7, this)">Normal</button>
            </div>
            <button class="btn-base start-btn" onclick="start()">START</button>
        </div>

        <div id="result-screen" class="overlay hidden">
            <h2>FINISH!</h2>
            <div id="final-time" style="font-size: 2.5rem; color: var(--accent-cyan);">0.00</div>
            <button class="btn-base start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="target" class="bin-display" style="position:absolute; width:100%; top:-60px;">00000000</div>
        <div id="mark" class="judgment-mark">⭕️</div>
    </div>

    <div class="hex-input-box">
        <div id="h1" class="hex-digit active">?</div>
        <div id="h2" class="hex-digit">?</div>
    </div>

    <div class="choice-grid">
        <script>
            for(let char of "0123456789ABCDEF") {
                document.write(`<button class="btn-base choice-btn" onclick="inputHex('${char}')">${char}</button>`);
            }
        </script>
    </div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        let targetVal = 0, qCount = 0, score = 0, speed = 0.7, y = -60, isWait = false, anim, startTime;
        let userInput = ["?", "?"];

        function setSpeed(s, b) { speed = s; }

        function start() { document.getElementById('start-screen').classList.add('hidden'); startTime = Date.now(); next(); }

        function next() {
            if(qCount >= 5) return endGame();
            qCount++;
            document.getElementById('q-count').innerText = qCount;
            targetVal = Math.floor(Math.random() * 255);
            document.getElementById('target').innerText = targetVal.toString(2).padStart(8, '0');
            userInput = ["?", "?"]; updateUI();
            y = -60; isWait = false; drop();
        }

        function updateUI() {
            document.getElementById('h1').innerText = userInput[0];
            document.getElementById('h2').innerText = userInput[1];
            document.getElementById('h1').className = (userInput[0] === "?") ? "hex-digit active" : "hex-digit";
            document.getElementById('h2').className = (userInput[0] !== "?" && userInput[1] === "?") ? "hex-digit active" : "hex-digit";
        }

        function inputHex(char) {
            if(isWait) return;
            if(userInput[0] === "?") userInput[0] = char;
            else if(userInput[1] === "?") {
                userInput[1] = char;
                const correct = targetVal.toString(16).toUpperCase().padStart(2, '0');
                handle(userInput.join('') === correct);
            }
            updateUI();
        }

        function drop() {
            if(isWait) return;
            y += speed;
            document.getElementById('target').style.top = y + 'px';
            if(y > 330) handle(false); else anim = requestAnimationFrame(drop);
        }

        function handle(win) {
            isWait = true; cancelAnimationFrame(anim);
            if(win) score++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className = 'judgment-mark'; next(); }, 1000);
        }

        function endGame() {
            const time = ((Date.now() - startTime)/1000).toFixed(2);
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-time').innerText = time + "s";
        }
    </script>
</body>
</html>
