<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Master - Normal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .bin-display {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1>Hex Master <span style="font-size: 0.6em; color: #4dd0e1;">(8-bit Normal)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>8-bit Hex Attack</h2>
            <p>16進数を2桁入力して正解を導け！</p>
            <button class="start-btn" onclick="start()">START</button>
        </div>

        <div id="result-screen" class="overlay" style="display:none;">
            <h2>MISSION COMPLETE</h2>
            <div style="font-size: 24px; color: #fff; margin-bottom: 10px;">Score: <span id="final-score">0</span> / 5</div>
            <div class="result-time"><span id="final-time">0.00</span> sec</div>
            <button class="start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="mark" class="judgment-mark"></div>
        
        <div id="target" class="bin-display">
            <span id="bin-high">0000</span><span class="bin-gap"></span><span id="bin-low">0000</span>
        </div>
    </div>

    <div class="answer-area">
        <span class="input-label">16進数：</span>
        <div class="hex-box-container">
            <div id="hex-1" class="hex-box active">?</div>
            <div id="hex-2" class="hex-box empty">?</div>
        </div>
        <button class="delete-btn" onclick="deleteLast()" title="削除">
            <span style="transform: scaleX(1.2);">⌫</span>
        </button>
    </div>
    
    <div class="choices-container">
        <div class="num-pad" id="num-pad"></div>
        <div class="alpha-pad" id="alpha-pad"></div>
    </div>

    <a href="index.html" class="back-link">MENUへ戻る</a>

    <script>
        let targetVal, qNum = 0, correctCount = 0, startTime, isWait = false, y = -100, anim;
        let currentStep = 1; 
        let userInput = [null, null];
        const MAX_QUEST = 5;

        function start() {
            document.getElementById('start-screen').style.display='none';
            startTime = Date.now();
            createButtons();
            next();
        }

        function createButtons() {
            const nPad = document.getElementById('num-pad');
            const aPad = document.getElementById('alpha-pad');
            nPad.innerHTML = ''; aPad.innerHTML = '';
            "0123456789".split("").forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'hex-btn'; btn.innerText = c;
                btn.onclick = () => inputHex(i, c);
                nPad.appendChild(btn);
            });
            "ABCDEF".split("").forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'hex-btn'; btn.innerText = c;
                btn.onclick = () => inputHex(i + 10, c);
                aPad.appendChild(btn);
            });
        }

        function next() {
            qNum++;
            if (qNum > MAX_QUEST) { endGame(); return; }
            currentStep = 1; userInput = [null, null];
            updateDisplay();
            
            document.getElementById('q-count').innerText = qNum;
            targetVal = Math.floor(Math.random() * 255) + 1;
            const binStr = targetVal.toString(2).padStart(8, '0');
            document.getElementById('bin-high').innerText = binStr.substring(0, 4);
            document.getElementById('bin-low').innerText = binStr.substring(4, 8);
            
            y = -100; isWait = false; 
            document.getElementById('target').style.display = 'block';
            drop();
        }

        function inputHex(val, char) {
            if(isWait) return;
            if(currentStep === 1) {
                userInput[0] = val;
                document.getElementById('hex-1').innerText = char;
                currentStep = 2;
                updateDisplay();
            } else {
                userInput[1] = val;
                document.getElementById('hex-2').innerText = char;
                updateDisplay();
                const finalVal = (userInput[0] << 4) | userInput[1];
                if(finalVal === targetVal) handle(true); else handle(false);
            }
        }

        function deleteLast() {
            if(isWait) return;
            if(currentStep === 2 && userInput[0] !== null) {
                currentStep = 1;
                userInput[0] = null;
            }
            updateDisplay();
        }

        function updateDisplay() {
            const h1 = document.getElementById('hex-1');
            const h2 = document.getElementById('hex-2');
            if(currentStep === 1) {
                h1.className = "hex-box active"; h1.innerText = "?";
                h2.className = "hex-box empty"; h2.innerText = "?";
            } else {
                h1.className = "hex-box"; h2.className = "hex-box active";
                if(userInput[1] === null) h2.innerText = "?";
            }
        }

        function drop() {
            if(isWait) return;
            y += 0.55;
            document.getElementById('target').style.top = y + 'px';
            if(y > 320) handle(false); else anim = requestAnimationFrame(drop);
        }

        function handle(win) {
            isWait = true; cancelAnimationFrame(anim);
            if(win) correctCount++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className = 'judgment-mark'; next(); }, 800);
        }

        function endGame() {
            const duration = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById('final-time').innerText = duration;
            document.getElementById('final-score').innerText = correctCount;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('target').style.display = 'none';
        }

        window.addEventListener('keydown', (e) => {
            if (isWait) return;
            const key = e.key.toUpperCase();
            const hexChars = "0123456789ABCDEF";
            const index = hexChars.indexOf(key);
            if (index !== -1) inputHex(index, key);
            if (e.key === 'Backspace' || e.key === 'Delete') deleteLast();
        });
    </script>
</body>
</html>
