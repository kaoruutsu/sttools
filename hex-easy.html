<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hex Master - Easy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hex Master <span>(4-bit Hex)</span></h1>
    <div id="stats-bar"><span>Quest: <span id="q-count">0</span> / 5</span></div>

    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h2>Hex Attack</h2>
            <p>2進数を16進数(0-F)に変換せよ</p>
            <div class="controls-row">
                <button class="control-btn" onclick="setSpeed(0.5, this)">Slow</button>
                <button class="control-btn active" onclick="setSpeed(0.8, this)">Normal</button>
                <button class="control-btn" onclick="setSpeed(1.3, this)">Fast</button>
            </div>
            <button class="btn-base start-btn" onclick="start()">START</button>
        </div>

        <div id="result-screen" class="overlay hidden">
            <h2>FINISH!</h2>
            <div id="final-time" style="font-size: 2.5rem; color: var(--accent-cyan);">0.00</div>
            <button class="btn-base start-btn" onclick="location.reload()">RETRY</button>
        </div>

        <div id="target" class="bin-display" style="position:absolute; width:100%; top:-60px;">0000</div>
        <div id="mark" class="judgment-mark">⭕️</div>
    </div>

    <div class="choice-grid">
        <script>
            const hex = "0123456789ABCDEF";
            for(let char of hex) {
                document.write(`<button class="btn-base choice-btn" onclick="check('${char}')">${char}</button>`);
            }
        </script>
    </div>

    <a href="index.html" class="back-link">← Portalに戻る</a>

    <script>
        let targetVal = 0, qCount = 0, score = 0, speed = 0.8, y = -60, isWait = false, anim, startTime;

        function setSpeed(s, b) {
            speed = s;
            document.querySelectorAll('.control-btn').forEach(el => el.classList.remove('active'));
            b.classList.add('active');
        }

        function start() {
            document.getElementById('start-screen').classList.add('hidden');
            startTime = Date.now(); next();
        }

        function next() {
            if(qCount >= 5) return endGame();
            qCount++;
            document.getElementById('q-count').innerText = qCount;
            targetVal = Math.floor(Math.random() * 16);
            document.getElementById('target').innerText = targetVal.toString(2).padStart(4, '0');
            y = -60; isWait = false; drop();
        }

        function drop() {
            if(isWait) return;
            y += speed;
            document.getElementById('target').style.top = y + 'px';
            if(y > 330) handle(false); else anim = requestAnimationFrame(drop);
        }

        function check(char) { if(!isWait) handle(parseInt(char, 16) === targetVal); }

        function handle(win) {
            isWait = true; cancelAnimationFrame(anim);
            if(win) score++;
            const m = document.getElementById('mark');
            m.innerText = win ? '⭕️' : '❌';
            m.className = `judgment-mark show-mark ${win ? 'mark-o' : 'mark-x'}`;
            setTimeout(() => { m.className = 'judgment-mark'; next(); }, 800);
        }

        function endGame() {
            const time = ((Date.now() - startTime)/1000).toFixed(2);
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-time').innerText = time + "s";
        }
    </script>
</body>
</html>
